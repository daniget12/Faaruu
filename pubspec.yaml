name: baafata_faaruu
description: Ethiopian Orthodox Tewahedo Mezmur App for Senbet Timihirt Bet

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  sqflite: ^2.3.2
  path: ^1.9.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.4
  intl: ^0.19.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Add this section
  assets:
    - assets/images/logo.png
    - assets/images/my_photo.png
